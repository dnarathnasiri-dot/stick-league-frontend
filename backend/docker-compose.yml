version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: sportstracker-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: sportstracker-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/sportstracker
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend-dayashanRepo/SportTracker-frontend
      dockerfile: Dockerfile
    container_name: sportstracker-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
